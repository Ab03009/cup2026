<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Դավիթ Գևորգյան Մրցաշար</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --primary: #00ff00;
            --primary-muted: rgba(0, 255, 0, 0.1);
            --bg: #000000;
            --card-bg: #050505;
            --border: #004400;
            --text-main: #ffffff;
            --text-dim: #666666;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .app-container { min-height: 100vh; background: var(--bg); }
        .content-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .logo { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; }
        .logo span { color: var(--primary); border-left: 2px solid var(--primary); padding-left: 10px; margin-left: 10px; }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .modern-table { width: 100%; border-collapse: collapse; }
        .modern-table th { color: var(--text-dim); font-size: 0.7rem; padding: 10px; border-bottom: 1px solid var(--border); }
        .modern-table td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(0, 255, 0, 0.05); }
        .name-cell { text-align: left !important; font-weight: 700; }

        /* Цветовые зоны */
        .zone-sf { background: rgba(0, 255, 0, 0.08) !important; }
        .zone-ko { background: rgba(163, 73, 164, 0.15) !important; }
        .zone-out { background: rgba(255, 0, 0, 0.05) !important; }

        .pts-cell { color: var(--primary); font-weight: 800; }

        .rounds-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .match-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .match-card:hover { border-color: var(--primary); background: var(--primary-muted); }

        .match-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; }
        .match-body { display: flex; justify-content: space-between; align-items: center; }
        .score-badge { background: #000; color: var(--primary); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); font-weight: 800; }

        .scorer-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; }
        .p-goals { color: var(--primary); font-weight: 800; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-box { background: #000; border: 1px solid var(--primary); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

        .reset-btn {
            background: transparent; color: var(--text-dim); border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .confirm-match-btn {
            background: var(--primary); color: #000; border: none; padding: 12px;
            border-radius: 8px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px;
        }
        
        .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const initialTeams = ["Off", "Galactikus", "Dracarys", "Renes", "Երեք Ոզնի", "Գենացվալե", "Շրջանավարտներ", "Red Storms"];

            const [isAdmin, setIsAdmin] = useState(false);
            const [currentScorer, setCurrentScorer] = useState('');

            const [matches, setMatches] = useState(() => {
                const saved = localStorage.getItem('tournament_data');
                return saved ? JSON.parse(saved) : [
                    { id: '1-1', round: 1, home: "Off", away: "Galactikus", date: '2026-04-13', time: '14:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '1-2', round: 1, home: "Dracarys", away: "Renes", date: '2026-04-13', time: '15:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '1-3', round: 1, home: "Երեք Ոզնի", away: "Գենացվալե", date: '2026-04-13', time: '16:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '1-4', round: 1, home: "Red Storms", away: "Շրջանավարտներ", date: '2026-04-13', time: '17:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '2-1', round: 2, home: "Off", away: "Dracarys", date: '2026-04-14', time: '14:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '2-2', round: 2, home: "Galactikus", away: "Երեք Ոզնի", date: '2026-04-14', time: '15:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '2-3', round: 2, home: "Renes", away: "Շրջանավարտներ", date: '2026-04-14', time: '16:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '2-4', round: 2, home: "Գենացվալե", away: "Red Storms", date: '2026-04-14', time: '17:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '3-1', round: 3, home: "Off", away: "Երեք Ոզնի", date: '2026-04-15', time: '14:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '3-2', round: 3, home: "Galactikus", away: "Renes", date: '2026-04-15', time: '15:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '3-3', round: 3, home: "Dracarys", away: "Red Storms", date: '2026-04-15', time: '16:00', homeScore: 0, awayScore: 0, status: 'pending' },
                    { id: '3-4', round: 3, home: "Գենացվալե", away: "Շրջանավարտներ", date: '2026-04-15', time: '17:00', homeScore: 0, awayScore: 0, status: 'pending' }
                ];
            });

            const [scorers, setScorers] = useState(() => JSON.parse(localStorage.getItem('scorers_data')) || {});
            const [selectedMatch, setSelectedMatch] = useState(null);

            useEffect(() => {
                localStorage.setItem('tournament_data', JSON.stringify(matches));
                localStorage.setItem('scorers_data', JSON.stringify(scorers));
            }, [matches, scorers]);

            const handleLogin = () => {
                const p = prompt("Գաղտնաբառ:");
                if(p === "Rob03009") setIsAdmin(true);
                else alert("Սխալ!");
            };

            const getStandings = () => {
                const table = {};
                initialTeams.forEach(t => table[t] = { name: t, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 });
                matches.filter(m => m.status === 'finished').forEach(m => {
                    const h = table[m.home], a = table[m.away];
                    h.mp++; a.mp++; h.gf += m.homeScore; h.ga += m.awayScore; a.gf += m.awayScore; a.ga += m.homeScore;
                    if (m.homeScore > m.awayScore) { h.w++; h.pts += 3; a.l++; }
                    else if (m.homeScore < m.awayScore) { a.w++; a.pts += 3; h.l++; }
                    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
                });
                return Object.values(table).sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga));
            };

            const addGoal = (isHome) => {
                if (!currentScorer.trim()) return alert("Անուն?");
                const team = isHome ? selectedMatch.home : selectedMatch.away;
                setScorers(prev => ({ ...prev, [currentScorer]: { goals: (prev[currentScorer]?.goals || 0) + 1, team } }));
                setMatches(prev => prev.map(m => m.id === selectedMatch.id ? { ...m, [isHome ? 'homeScore' : 'awayScore']: m[isHome ? 'homeScore' : 'awayScore'] + 1 } : m));
                setSelectedMatch(prev => ({ ...prev, [isHome ? 'homeScore' : 'awayScore']: prev[isHome ? 'homeScore' : 'awayScore'] + 1 }));
                setCurrentScorer('');
            };

            const finishMatch = () => {
                setMatches(prev => prev.map(m => m.id === selectedMatch.id ? { ...m, status: 'finished' } : m));
                setSelectedMatch(null);
            };

            const standings = getStandings();

            return (
                <div className="app-container">
                    <div className="content-wrapper">
                        <header className="main-header">
                            <div className="logo">ԴԱՎԻԹ ԳԵՎՈՐԳՅԱՆ <span>ՄՐՑԱՇԱՐ</span></div>
                            <div>
                                {!isAdmin ? <button onClick={handleLogin} className="reset-btn">ADMIN</button> : 
                                <button onClick={() => setIsAdmin(false)} className="reset-btn">LOGOUT</button>}
                            </div>
                        </header>

                        <section className="section-card">
                            <table className="modern-table">
                                <thead>
                                    <tr><th>#</th><th className="name-cell">Թիմ</th><th>Խ</th><th>Մ</th></tr>
                                </thead>
                                <tbody>
                                    {standings.map((t, i) => (
                                        <tr key={i} className={i < 2 ? "zone-sf" : i >= 2 && i < 6 ? "zone-ko" : i === 7 ? "zone-out" : ""}>
                                            <td>{i+1}</td>
                                            <td className="name-cell">{t.name}</td>
                                            <td>{t.mp}</td>
                                            <td className="pts-cell">{t.pts}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </section>

                        <div className="rounds-container">
                            {[1, 2, 3].map(r => (
                                <div key={r} className="section-card">
                                    <h3 style={{color: 'var(--primary)', fontSize: '0.9rem'}}>ՓՈՒԼ {r}</h3>
                                    {matches.filter(m => m.round === r).map(m => (
                                        <div key={m.id} className="match-card" onClick={() => isAdmin && setSelectedMatch(m)}>
                                            <div className="match-meta"><span>{m.time}</span></div>
                                            <div className="match-body">
                                                <span>{m.home}</span>
                                                <div className="score-badge">{m.status === 'finished' ? `${m.homeScore}:${m.awayScore}` : 'VS'}</div>
                                                <span>{m.away}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        
                        <div className="section-card">
                            <h3>Ռմբարկուներ</h3>
                            {Object.entries(scorers).sort((a,b) => b[1].goals - a[1].goals).map(([name, d], i) => (
                                <div key={i} className="scorer-row">
                                    <span>{name} ({d.team})</span>
                                    <span className="p-goals">{d.goals}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedMatch && (
                        <div className="modal-overlay">
                            <div className="modal-box">
                                <h2>{selectedMatch.home} vs {selectedMatch.away}</h2>
                                <h1 style={{fontSize: '3rem', color: 'var(--primary)'}}>{selectedMatch.homeScore}:{selectedMatch.awayScore}</h1>
                                <input 
                                    style={{width: '100%', padding: '10px', background: '#111', color: '#fff', border: '1px solid var(--border)', borderRadius: '8px', marginBottom: '10px'}}
                                    placeholder="Խաղացողի անունը..."
                                    value={currentScorer}
                                    onChange={e => setCurrentScorer(e.target.value)}
                                />
                                <div style={{display: 'flex', gap: '10px'}}>
                                    <button className="confirm-match-btn" onClick={() => addGoal(true)}>+ {selectedMatch.home}</button>
                                    <button className="confirm-match-btn" onClick={() => addGoal(false)}>+ {selectedMatch.away}</button>
                                </div>
                                <button className="confirm-match-btn" style={{background: '#fff'}} onClick={finishMatch}>Ավարտել խաղը</button>
                                <button onClick={() => setSelectedMatch(null)} style={{marginTop: '15px', color: '#666', background: 'none', border: 'none', cursor: 'pointer'}}>Փակել</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
